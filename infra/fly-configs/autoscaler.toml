app = 'automa-web-core-seleniumgrid-node-autoscaler-__FLY_ENVIRONMENT__'
primary_region = 'jnb'

[build]

[processes]
app = './SeleniumGridNodeMachineAutoscaler autocreator'
off_machines_auto_destroyer = './SeleniumGridNodeMachineAutoscaler autodestroyer offMachines'
old_machines_auto_destroyer = './SeleniumGridNodeMachineAutoscaler autodestroyer oldMachines'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'
auto_start_machines = false
min_machines_running = 0
processes = [
    'app',
    'off_machines_auto_destroyer',
    'old_machines_auto_destroyer',
]

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1

[metrics]
port = 6834
path = "/metrics"
processes = [
    'app',
    'off_machines_auto_destroyer',
    'old_machines_auto_destroyer',
]
