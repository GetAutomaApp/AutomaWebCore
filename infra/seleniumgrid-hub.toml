# fly.toml app configuration file generated for automa-web-core-seleniumgrid-hub on 2025-08-20T14:42:20+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'automa-web-core-seleniumgrid-hub'
primary_region = 'jnb'

[build]
  image = 'selenium/hub:latest'

[[services]]
  protocol = 'tcp'
  internal_port = 4444
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
