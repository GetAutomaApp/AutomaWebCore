app = 'automa-web-core-seleniumgrid-node-old-machines-destroyer'
primary_region = 'jnb'

[env]
RUN_COMMAND = "autodestroyer oldMachines"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'
auto_start_machines = false
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
