# fly.toml app configuration file generated for automa-web-core-seleniumgrid-node-autoscaler on 2025-09-01T18:06:11+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'automa-web-core-seleniumgrid-node-autoscaler'
primary_region = 'jnb'

[build]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'
auto_start_machines = false
min_machines_running = 0
processes = [
    'app',
    'off_machines_auto_destroyer',
    'old_machines_auto_destroyer',
]

[processes]
app = "./SeleniumGridNodeMachineAutoscaler autoscaler"
off_machines_auto_destroyer = "./SeleniumGridNodeMachineAutoscaler autodestroyer offMachines"
old_machines_auto_destroyer = "./SeleniumGridNodeMachineAutoscaler autodestroyer oldMachines"

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
