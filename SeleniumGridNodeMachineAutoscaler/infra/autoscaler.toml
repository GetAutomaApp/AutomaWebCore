app = 'automa-web-core-seleniumgrid-node-autoscaler'
primary_region = 'jnb'

[build]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'
auto_start_machines = false
min_machines_running = 0
processes = [
    'machines_auto_creator',
    'off_machines_auto_destroyer',
    'old_machines_auto_destroyer',
]

[processes]
machines_auto_creator = "./SeleniumGridNodeMachineAutoscaler autocreator"
off_machines_auto_destroyer = "./SeleniumGridNodeMachineAutoscaler autodestroyer offMachines"
old_machines_auto_destroyer = "./SeleniumGridNodeMachineAutoscaler autodestroyer oldMachines"

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
