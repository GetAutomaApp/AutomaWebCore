# fly.toml app configuration file generated for automa-web-core-seleniumgrid-node-autoscaler on 2025-09-01T18:06:11+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'automa-web-core-seleniumgrid-node-autoscaler'
primary_region = 'jnb'

[build]

[env]
  RUN_COMMAND = 'autoscaler'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
